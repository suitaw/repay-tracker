<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fafaf9;
  --card:#ffffff;
  --border:#e7e5e4;
  --border-soft:#f5f5f4;
  --text:#1c1917;
  --text2:#78716c;
  --text3:#a8a29e;
  --text-mute:#d6d3d1;
  --hd-bg:rgba(250,250,249,0.92);
  --nv-bg:rgba(250,250,249,0.95);
  --chip:#f5f5f4;
  --today-bg:linear-gradient(90deg,#fffbeb,#fff 100%);
  --today-tag-bg:#dbeafe;
  --today-tag-c:#1d4ed8;
  --od-bg:linear-gradient(90deg,#fef2f2,#fff 100%);
  --od-tag-bg:#fef2f2;
  --od-tag-c:#dc2626;
  --od-card-bg:#fef2f2;
  --od-card-border:#fecaca;
  --od-card-text:#991b1b;
  --done-bg:#f0fdf4;
  --done-border:#bbf7d0;
  --done-c:#16a34a;
  --bar-empty:#f5f5f4;
  --bar-fill:#1c1917;
  --dot:#ff8c2e;
  --soon-bg:#fef2f2;
  --r:14px;
}
[data-theme="dark"]{
  --bg:#0c0a09;
  --card:#1c1917;
  --border:#292524;
  --border-soft:#1c1917;
  --text:#fafaf9;
  --text2:#a8a29e;
  --text3:#78716c;
  --text-mute:#44403c;
  --hd-bg:rgba(12,10,9,0.92);
  --nv-bg:rgba(12,10,9,0.95);
  --chip:#292524;
  --today-bg:linear-gradient(90deg,rgba(245,158,11,0.15),transparent);
  --today-tag-bg:rgba(59,130,246,0.2);
  --today-tag-c:#93c5fd;
  --od-bg:linear-gradient(90deg,rgba(220,38,38,0.15),transparent);
  --od-tag-bg:rgba(220,38,38,0.2);
  --od-tag-c:#fca5a5;
  --od-card-bg:rgba(220,38,38,0.1);
  --od-card-border:rgba(220,38,38,0.3);
  --od-card-text:#fca5a5;
  --done-bg:rgba(34,197,94,0.1);
  --done-border:rgba(34,197,94,0.3);
  --done-c:#86efac;
  --bar-empty:#292524;
  --bar-fill:#fafaf9;
  --soon-bg:rgba(220,38,38,0.15);
}
body{
  font-family:'DM Sans',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;padding-bottom:120px;font-size:15px;line-height:1.5;
  transition:background .2s,color .2s;
}

.hd{position:sticky;top:0;z-index:100;background:var(--hd-bg);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:14px 16px 12px}
.brand-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.brand{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:5px;text-transform:uppercase;color:var(--text3);flex:1;text-align:center;margin-left:32px}
.theme-toggle{width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:var(--chip);border:none;border-radius:50%;cursor:pointer;font-size:14px;color:var(--text2)}

.hero{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px 16px;text-align:center;margin-bottom:10px;position:relative}
.hero-n{font-family:'DM Mono',monospace;font-size:48px;font-weight:800;letter-spacing:-2px;color:var(--text);line-height:1}
.hero-n .u{font-size:24px;font-weight:500;opacity:.4;margin-right:2px}
.hero-l{font-size:11px;color:var(--text3);margin-top:6px;letter-spacing:2px;text-transform:uppercase;font-weight:700}

.nextpay{margin-top:14px;padding-top:14px;border-top:1px dashed var(--border);display:flex;justify-content:space-between;align-items:center;font-size:13px;gap:8px}
.nextpay-info{display:flex;align-items:center;gap:6px;flex:1;flex-wrap:wrap;justify-content:flex-start}
.nextpay-l{color:var(--text2);font-weight:600;flex-shrink:0}
.nextpay-r{font-family:'DM Mono',monospace;font-weight:700;color:var(--text);display:inline-flex;align-items:center;gap:6px;flex-wrap:wrap}
.nextpay-r .npd{color:#dc2626;font-weight:700}
[data-theme="dark"] .nextpay-r .npd{color:#fca5a5}
.nextpay-r .npd.soon{background:var(--soon-bg);padding:2px 6px;border-radius:4px}
.np-check{width:30px;height:30px;border-radius:50%;border:2px solid var(--done-c);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:var(--done-c);font-weight:800;font-size:14px;transition:all .2s}
.np-check:active{transform:scale(.9);background:var(--done-c);color:#fff}

.row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 6px;text-align:center}
.box-v{font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:var(--text)}
.box-l{font-size:10px;color:var(--text3);margin-top:2px;font-weight:600}

/* 本月迷你进度条 */
.month-mini{margin-top:6px;height:3px;background:var(--bar-empty);border-radius:2px;overflow:hidden;margin-left:6px;margin-right:6px}
.month-mini-fill{height:100%;background:var(--bar-fill);border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1)}

.pw{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px}
.pb{height:6px;background:var(--bar-empty);border-radius:3px;overflow:hidden}
.pbf{height:100%;background:var(--bar-fill);border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.pi{display:flex;justify-content:space-between;margin-top:5px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text3)}

/* 周节奏柱状图 */
.rhythm{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-top:10px}
.rhythm-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.rhythm-t{font-size:11px;letter-spacing:1px;font-weight:700;color:var(--text3);text-transform:uppercase}
.rhythm-sub{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.rhythm-bars{display:flex;align-items:flex-end;gap:6px;height:60px;padding-top:14px}
.rb{flex:1;background:var(--chip);border-radius:4px 4px 0 0;position:relative;transition:height .4s cubic-bezier(.4,0,.2,1);min-height:3px}
.rb.high{background:var(--bar-fill)}
.rb.zero{background:var(--border-soft);opacity:.5}
.rb-v{position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;color:var(--text3);white-space:nowrap;font-family:'DM Mono',monospace}
.rhythm-labels{display:flex;gap:6px;margin-top:6px}
.rl{flex:1;text-align:center;font-size:9px;color:var(--text3);font-weight:600}

.tgl{display:flex;justify-content:center;gap:8px;padding:8px 16px;background:var(--nv-bg);border-bottom:1px solid var(--border)}
.tgl-btn{padding:6px 14px;border:1px solid var(--border);background:var(--card);border-radius:100px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif}
.tgl-btn.on{background:var(--text);color:var(--bg);border-color:var(--text)}

.nv{display:flex;gap:4px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;background:var(--nv-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nv::-webkit-scrollbar{display:none}
.ni{flex-shrink:0;padding:7px 18px;border-radius:100px;border:none;background:var(--chip);color:var(--text3);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.ni.on{background:var(--text);color:var(--bg)}

.mls-wrap{padding:10px 16px 4px}
.mls-bar{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 14px;cursor:pointer;-webkit-user-select:none;user-select:none}
.mls-bar-l{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--text2)}
.mls-bar-chip{display:inline-flex;align-items:center;gap:3px;background:var(--chip);padding:3px 8px;border-radius:100px;font-family:'DM Mono',monospace;font-size:11px;font-weight:700;color:var(--text2)}
.mls-bar-chip.done{background:var(--done-bg);color:var(--done-c)}
.mls-bar-arrow{font-size:12px;color:var(--text3);transition:transform .2s}
.mls-bar.open .mls-bar-arrow{transform:rotate(180deg)}
.mls-list{padding-top:8px;display:none}
.mls-list.open{display:block}
.ml{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:6px}
.ml.dn{background:var(--done-bg);border-color:var(--done-border)}
.ml.dn .mlt{color:var(--text3);text-decoration:line-through}
.ml.dn .mld{color:var(--text3)}
.mli{font-size:16px;flex-shrink:0}
.mlt{flex:1;font-size:13px;font-weight:700;color:var(--text)}
.mld{font-family:'DM Mono',monospace;font-size:12px;color:var(--text3)}

.alert{padding:0 16px 8px}
.alert-card{background:var(--od-card-bg);border:1px solid var(--od-card-border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px}
.alert-icon{font-size:18px}
.alert-text{flex:1;font-size:13px;font-weight:600;color:var(--od-card-text)}
.alert-count{font-family:'DM Mono',monospace;font-size:12px;color:var(--od-tag-c);font-weight:700}

.sec{padding:0 16px;margin-bottom:4px}
.sh{display:flex;align-items:baseline;gap:10px;padding:20px 0 10px}
.sm{font-size:24px;font-weight:800;letter-spacing:-.5px;color:var(--text)}
.st2{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:var(--text2);background:var(--chip);padding:3px 12px;border-radius:100px}

.wk{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.wkh{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border-soft)}
.wkr{font-size:13px;color:var(--text2);font-weight:700}
.wka{font-family:'DM Mono',monospace;font-size:15px;font-weight:800;color:var(--text)}

.it{display:flex;align-items:center;padding:14px 16px;gap:12px;border-bottom:1px solid var(--border-soft);transition:all .2s;cursor:pointer;-webkit-user-select:none;user-select:none;min-height:60px}
.it:last-child{border-bottom:none}
.it:active{background:var(--chip)}
.it.dn{opacity:.35}
.it.dn .ia{text-decoration:line-through}
.it.today{background:var(--today-bg);border-left:3px solid #f59e0b}
.it.today.dn{background:transparent;border-left:none}
.it.overdue{background:var(--od-bg);border-left:3px solid #dc2626}
.it.overdue.dn{background:transparent;border-left:none}

.ck{width:26px;height:26px;border-radius:50%;border:2px solid var(--text-mute);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;background:var(--card);pointer-events:none}
.ck.on{border-color:#16a34a;background:#16a34a}
.ck.on::after{content:'';width:6px;height:10px;border:solid #fff;border-width:0 2.5px 2.5px 0;transform:rotate(45deg);margin-top:-2px}

.ib{flex:1;min-width:0;pointer-events:none}
.itp{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.idt{font-size:14px;font-weight:700;color:var(--text)}
.idy{font-size:12px;color:var(--text3);font-weight:600}
.itg{font-size:9px;padding:2px 7px;border-radius:4px;font-weight:700;letter-spacing:.3px}
.tt{background:var(--today-tag-bg);color:var(--today-tag-c)}
.te{background:var(--done-bg);color:var(--done-c)}
.tov{background:var(--od-tag-bg);color:var(--od-tag-c)}

.is{font-size:12px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:5px;font-weight:600}
.dt{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--dot)}

.ia{font-family:'DM Mono',monospace;font-size:16px;font-weight:700;color:var(--text);flex-shrink:0;pointer-events:none}

.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-i{font-size:48px;margin-bottom:12px}
.empty-t{font-size:14px;font-weight:600}

.rst{display:block;margin:40px auto 20px;padding:13px 32px;background:var(--card);color:#dc2626;border:1px solid var(--border);border-radius:100px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer}
[data-theme="dark"] .rst{color:#fca5a5}
.shr{display:block;margin:10px auto;padding:11px 28px;background:var(--text);color:var(--bg);border:none;border-radius:100px;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer}
.top{position:fixed;bottom:28px;right:20px;width:48px;height:48px;border-radius:50%;background:var(--text);color:var(--bg);font-size:20px;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,0.15);opacity:0;pointer-events:none;transition:all .3s;border:none}
.top.show{opacity:1;pointer-events:auto}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:100px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:all .3s;z-index:300}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* 撒花动画 */
.confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1000;display:none}
.confetti.show{display:block}
.cfp{position:absolute;width:8px;height:8px;animation:cfall 2s ease-in forwards}
@keyframes cfall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<div class="hd">
<div class="brand-row">
  <div style="width:32px"></div>
  <div class="brand">Payoff</div>
  <button class="theme-toggle" id="themeToggle" title="切换主题">☾</button>
</div>
<div class="hero">
  <div class="hero-n"><span class="u">¥</span><span id="hA">0</span></div>
  <div class="hero-l">剩余待还</div>
  <div class="nextpay" id="nextpay" style="display:none">
    <div class="nextpay-info">
      <span class="nextpay-l">下一笔</span>
      <span class="nextpay-r" id="nextpayInfo"></span>
    </div>
    <button class="np-check" id="npCheck" title="勾选下一笔">✓</button>
  </div>
</div>
<div class="row">
<div class="box">
  <div class="box-v" id="sP">¥0</div>
  <div class="box-l">已还</div>
</div>
<div class="box">
  <div class="box-v" id="sM">¥0</div>
  <div class="box-l">本月剩余</div>
  <div class="month-mini"><div class="month-mini-fill" id="mMiniBar"></div></div>
</div>
<div class="box"><div class="box-v" id="sC">0</div><div class="box-l">进度</div></div>
</div>
<div class="pw"><div class="pb"><div class="pbf" id="pB"></div></div><div class="pi"><span id="pP">0%</span><span id="pL">0/0</span></div></div>
<div class="rhythm">
  <div class="rhythm-h">
    <span class="rhythm-t">未来 8 周节奏</span>
    <span class="rhythm-sub" id="rhythmSub"></span>
  </div>
  <div class="rhythm-bars" id="rhythmBars"></div>
  <div class="rhythm-labels" id="rhythmLabels"></div>
</div>
</div>
<div class="tgl">
  <button class="tgl-btn on" data-mode="active">仅待还</button>
  <button class="tgl-btn" data-mode="all">显示全部</button>
</div>
<div class="nv" id="nv"></div>
<div class="alert" id="alertBox" style="display:none"></div>
<div class="mls-wrap">
  <div class="mls-bar" id="mlsBar">
    <div class="mls-bar-l"><span>🏁 里程碑</span><span class="mls-bar-chip" id="mlsChip">0/6</span></div>
    <span class="mls-bar-arrow">▼</span>
  </div>
  <div class="mls-list" id="ms"></div>
</div>
<div id="app"></div>
<button class="shr" id="shareBtn">复制带进度的链接</button>
<button class="rst" id="resetBtn">重置所有记录</button>
<button class="top" id="tp">↑</button>
<div class="toast" id="toast"></div>
<div class="confetti" id="confetti"></div>

const WD=['日','一','二','三','四','五','六'];
const TODAY=(()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')})();

const ML=[
  {n:10,i:"🚩",t:"完成 10 期"},
  {n:27,i:"🥉",t:"完成 1/4 (27 期)"},
  {n:54,i:"🥈",t:"完成 1/2 (54 期)"},
  {n:80,i:"🥇",t:"完成 3/4 (80 期)"},
  {n:97,i:"🔔",t:"还剩 10 期"},
  {n:107,i:"🎊",t:"全部结清"}
];

let viewMode='active';
let mlsOpen=false;
let theme=localStorage.getItem('po-theme')||(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');

function applyTheme(){
  if(theme==='dark'){
    document.documentElement.setAttribute('data-theme','dark');
    document.getElementById('themeToggle').textContent='☀';
  }else{
    document.documentElement.removeAttribute('data-theme');
    document.getElementById('themeToggle').textContent='☾';
  }
}

function decodeFromUrl(){
  try{
    const u=new URL(location.href);
    const s=u.searchParams.get('s');
    if(!s)return null;
    const bits=[];
    for(let i=0;i<s.length;i++){
      const v=parseInt(s[i],36);
      for(let j=0;j<5;j++){bits.push((v>>j)&1)}
    }
    const obj={};
    for(let i=0;i<D.length;i++)if(bits[i])obj[i]=true;
    return obj;
  }catch(e){return null}
}
function encodeToUrl(){
  const bits=[];
  for(let i=0;i<D.length;i++)bits.push(ck[i]?1:0);
  let s='';
  for(let i=0;i<bits.length;i+=5){
    let v=0;
    for(let j=0;j<5;j++)v|=(bits[i+j]||0)<<j;
    s+=v.toString(36);
  }
  return s;
}
function updateUrl(){
  try{
    const s=encodeToUrl();
    const u=new URL(location.href);
    if(s.replace(/0+$/,''))u.searchParams.set('s',s);
    else u.searchParams.delete('s');
    history.replaceState(null,'',u.toString());
  }catch(e){}
}

let ck={};
const fromUrl=decodeFromUrl();
if(fromUrl){
  ck=fromUrl;
  try{localStorage.setItem('po6',JSON.stringify(ck))}catch(e){}
}else{
  try{ck=JSON.parse(localStorage.getItem('po6')||'{}')}catch(e){}
}

function sv(){
  try{localStorage.setItem('po6',JSON.stringify(ck))}catch(e){}
  updateUrl();
}
function wk(ds){const d=new Date(ds+'T00:00:00'),w=d.getDay(),df=(w<4)?-(w+3):-(w-4);const s=new Date(d);s.setDate(s.getDate()+df);return s.toISOString().slice(0,10)}
function fm(ds){const[y,m,d]=ds.split('-');return`${+m}/${+d}`}
function gm(ds){return ds.slice(0,7)}
function daysBetween(a,b){const da=new Date(a+'T00:00:00'),db=new Date(b+'T00:00:00');return Math.round((db-da)/86400000)}
function vibrate(ms){try{if(navigator.vibrate)navigator.vibrate(ms)}catch(e){}}

// 数字滚动动画
function animateNumber(el,from,to,duration){
  const start=performance.now();
  const diff=to-from;
  function step(now){
    const t=Math.min(1,(now-start)/duration);
    const eased=1-Math.pow(1-t,3);
    el.textContent=Math.round(from+diff*eased).toString();
    if(t<1)requestAnimationFrame(step);
    else el.textContent=Math.round(to).toString();
  }
  requestAnimationFrame(step);
}

function tog(i){
  const wasComplete=Object.keys(ck).length===D.length;
  ck[i]=!ck[i];
  if(!ck[i])delete ck[i];
  vibrate(15);
  sv();
  // 全部勾完撒花
  if(!wasComplete&&Object.keys(ck).length===D.length){
    setTimeout(showConfetti,300);
  }
  render(true);
}

function showConfetti(){
  const cf=document.getElementById('confetti');
  cf.innerHTML='';
  const colors=['#ff8c2e','#16a34a','#dc2626','#f59e0b','#3b82f6','#a855f7'];
  for(let i=0;i<60;i++){
    const p=document.createElement('div');
    p.className='cfp';
    p.style.left=Math.random()*100+'%';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDelay=Math.random()*0.5+'s';
    p.style.animationDuration=(1.5+Math.random())+'s';
    cf.appendChild(p);
  }
  cf.classList.add('show');
  setTimeout(()=>cf.classList.remove('show'),3000);
}

function resetAll(){if(confirm('确定清除所有记录？')){ck={};sv();render()}}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)}
function shareUrl(){
  updateUrl();
  const url=location.href;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(()=>showToast('链接已复制')).catch(()=>{prompt('复制此链接：',url)})
  }else{prompt('复制此链接：',url)}
}

function getStatus(it){
  if(ck[it.i])return 'done';
  if(it.d===TODAY)return 'today';
  if(it.d<TODAY)return 'overdue';
  return 'future';
}

function shouldShow(it){
  if(viewMode==='all')return true;
  const s=getStatus(it);
  if(s==='done'&&it.d<TODAY)return false;
  return true;
}

function weekToMonth(weekStart){
  const d=new Date(weekStart+'T00:00:00');
  d.setDate(d.getDate()+3);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}

// 未来 N 周节奏
function renderRhythm(){
  const bars=document.getElementById('rhythmBars');
  const labels=document.getElementById('rhythmLabels');
  const sub=document.getElementById('rhythmSub');
  // 从今天所在周开始（不在周内则取下一个周四起的周），共 8 周
  const todayWeekStart=wk(TODAY);
  const weeks=[];
  for(let i=0;i<8;i++){
    const d=new Date(todayWeekStart+'T00:00:00');
    d.setDate(d.getDate()+i*7);
    weeks.push(d.toISOString().slice(0,10));
  }
  const weekSums=weeks.map(ws=>{
    const we=new Date(ws+'T00:00:00');we.setDate(we.getDate()+6);
    const wsd=ws,wed=we.toISOString().slice(0,10);
    let s=0;
    D.forEach((d,i)=>{if(!ck[i]&&d.d>=wsd&&d.d<=wed&&d.d>=TODAY)s+=d.a});
    return s;
  });
  const max=Math.max(...weekSums,1);
  const total=weekSums.reduce((a,b)=>a+b,0);
  sub.textContent=`共 ¥${total.toFixed(0)}`;
  bars.innerHTML=weekSums.map((v,idx)=>{
    const h=v===0?3:Math.max(3,Math.round(v/max*46));
    let cls='rb';
    if(v===0)cls+=' zero';
    else if(v>max*0.7)cls+=' high';
    return`<div class="${cls}" style="height:${h}px">${v>0?`<span class="rb-v">${v>=1000?(v/1000).toFixed(1)+'k':Math.round(v)}</span>`:''}</div>`;
  }).join('');
  labels.innerHTML=weeks.map(ws=>{
    const[y,m,d]=ws.split('-');
    return`<div class="rl">${+m}/${+d}</div>`;
  }).join('');
}

let lastRem=null,lastPaid=null;
function updStats(animate){
  const tot=D.reduce((s,d)=>s+d.a,0);
  let paid=0,pc=0;
  D.forEach((d,i)=>{if(ck[i]){paid+=d.a;pc++}});
  const rem=tot-paid,now=new Date(),cm=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  let mTot=0,mPaid=0;
  D.forEach((d,i)=>{if(gm(d.d)===cm){mTot+=d.a;if(ck[i])mPaid+=d.a}});
  const mRem=mTot-mPaid;

  const hAEl=document.getElementById('hA'),sPEl=document.getElementById('sP');
  if(animate&&lastRem!==null){
    animateNumber(hAEl,lastRem,Math.round(rem),500);
    animateNumber({set textContent(v){sPEl.textContent='¥'+v}},lastPaid,Math.round(paid),500);
  }else{
    hAEl.textContent=Math.round(rem);
    sPEl.textContent='¥'+Math.round(paid);
  }
  lastRem=Math.round(rem);lastPaid=Math.round(paid);

  document.getElementById('sM').textContent='¥'+mRem.toFixed(0);
  document.getElementById('mMiniBar').style.width=(mTot>0?(mPaid/mTot*100):0)+'%';
  document.getElementById('sC').textContent=pc+'/'+D.length;
  const pct=paid/tot*100;
  document.getElementById('pB').style.width=pct+'%';
  document.getElementById('pP').textContent=pct.toFixed(1)+'%';
  document.getElementById('pL').textContent=pc+'/'+D.length;

  // 下一笔
  const np=document.getElementById('nextpay');
  const npInfo=document.getElementById('nextpayInfo');
  const npCheck=document.getElementById('npCheck');
  let nextItem=null;
  for(let i=0;i<D.length;i++){
    if(!ck[i]&&D[i].d>=TODAY){nextItem={...D[i],i};break}
  }
  if(nextItem){
    const days=daysBetween(TODAY,nextItem.d);
    const wd=WD[new Date(nextItem.d+'T00:00:00').getDay()];
    let dayLabel;
    if(days===0)dayLabel='<span class="npd soon">就在今天</span>';
    else if(days===1)dayLabel='<span class="npd">明天</span>';
    else if(days<=3)dayLabel=`<span class="npd soon">${days} 天后</span>`;
    else dayLabel=`<span style="color:var(--text2)">${days} 天后</span>`;
    npInfo.innerHTML=`<span class="nextpay-l">下一笔</span><span class="nextpay-r">${dayLabel} ${fm(nextItem.d)} 周${wd} · ¥${nextItem.a.toFixed(2)}</span>`;
    np.style.display='flex';
    npCheck.dataset.idx=nextItem.i;
  }else{
    np.style.display='none';
  }

  let mlDoneCount=0;
  ML.forEach(m=>{if(pc>=m.n)mlDoneCount++});
  document.getElementById('mlsChip').textContent=mlDoneCount+'/'+ML.length;
  document.getElementById('mlsChip').className='mls-bar-chip'+(mlDoneCount===ML.length?' done':'');
  document.getElementById('ms').innerHTML=ML.map(m=>{
    const done=pc>=m.n;
    return`<div class="ml ${done?'dn':''}"><span class="mli">${m.i}</span><span class="mlt">${m.t}</span><span class="mld">${m.n}/${D.length}</span></div>`
  }).join('');

  let overdueCount=0,overdueAmt=0;
  D.forEach((d,i)=>{if(!ck[i]&&d.d<TODAY){overdueCount++;overdueAmt+=d.a}});
  const ab=document.getElementById('alertBox');
  if(overdueCount>0){
    ab.style.display='block';
    ab.innerHTML=`<div class="alert-card"><span class="alert-icon">⚠️</span><span class="alert-text">有 ${overdueCount} 期逾期未还</span><span class="alert-count">¥${overdueAmt.toFixed(0)}</span></div>`;
  }else{
    ab.style.display='none';
  }

  renderRhythm();
}

function render(animate){
  updStats(animate);
  const visibleItems=D.map((d,i)=>({...d,i})).filter(shouldShow);

  const weeks={};
  visibleItems.forEach(it=>{
    const w=wk(it.d);
    if(!weeks[w])weeks[w]=[];
    weeks[w].push(it);
  });

  const mmap={};
  Object.keys(weeks).forEach(w=>{
    const m=weekToMonth(w);
    if(!mmap[m])mmap[m]=[];
    mmap[m].push(w);
  });

  const app=document.getElementById('app'),months=Object.keys(mmap).sort();
  if(months.length===0){
    app.innerHTML=`<div class="empty"><div class="empty-i">🎉</div><div class="empty-t">没有待还的款项了</div></div>`;
    document.getElementById('nv').innerHTML='';
    return;
  }
  let h='';
  months.forEach(mk=>{
    const[y,m]=mk.split('-');
    const yr=y==='2027'?"'27 ":'';
    const ml=`${yr}${+m}月`;
    let mt=0;
    mmap[mk].forEach(w=>{
      weeks[w].forEach(it=>{if(!ck[it.i])mt+=it.a});
    });
    const mLabel=mt>0?`¥${mt.toFixed(0)}`:'已完成';
    h+=`<div class="sec" id="m-${mk}"><div class="sh"><span class="sm">${ml}</span><span class="st2">${mLabel}</span></div>`;
    mmap[mk].sort().forEach(w=>{
      const items=weeks[w];
      const we=new Date(w+'T00:00:00');
      we.setDate(we.getDate()+6);
      const wes=we.toISOString().slice(0,10);
      const wt=items.filter(it=>!ck[it.i]).reduce((s,d)=>s+d.a,0);
      h+=`<div class="wk"><div class="wkh"><span class="wkr">${fm(w)} — ${fm(wes)}</span><span class="wka">¥${wt.toFixed(0)}</span></div>`;
      items.forEach(it=>{
        const dt=new Date(it.d+'T00:00:00'),wd=WD[dt.getDay()];
        const status=getStatus(it),on=ck[it.i];
        let cls='it';
        if(on)cls+=' dn';
        if(status==='today')cls+=' today';
        else if(status==='overdue')cls+=' overdue';
        let tag='';
        if(status==='today')tag=`<span class="itg tt">今天</span>`;
        else if(status==='overdue')tag=`<span class="itg tov">逾期</span>`;
        else if(it.t)tag=`<span class="itg te">${it.t}</span>`;
        h+=`<div class="${cls}" data-idx="${it.i}"><div class="ck${on?' on':''}"></div><div class="ib"><div class="itp"><span class="idt">${fm(it.d)}</span><span class="idy">周${wd}</span>${tag}</div><div class="is"><span class="dt"></span>360借条</div></div><div class="ia">¥${it.a.toFixed(2)}</div></div>`;
      });
      h+=`</div>`;
    });
    h+=`</div>`;
  });
  app.innerHTML=h;
  document.getElementById('nv').innerHTML=months.map(mk=>{
    const[y,m]=mk.split('-');
    const yr=y==='2027'?"'27 ":'';
    return`<button class="ni" data-m="${mk}">${yr}${+m}月</button>`;
  }).join('');

  if(mlsOpen){
    document.getElementById('mlsBar').classList.add('open');
    document.getElementById('ms').classList.add('open');
  }
}

document.body.addEventListener('click',function(e){
  // 主题切换
  if(e.target.id==='themeToggle'){
    theme=theme==='dark'?'light':'dark';
    localStorage.setItem('po-theme',theme);
    applyTheme();
    return;
  }
  // 快速勾选下一笔
  if(e.target.id==='npCheck'){
    const idx=parseInt(e.target.dataset.idx);
    if(!isNaN(idx))tog(idx);
    return;
  }
  const tglBtn=e.target.closest('.tgl-btn');
  if(tglBtn){
    document.querySelectorAll('.tgl-btn').forEach(b=>b.classList.remove('on'));
    tglBtn.classList.add('on');
    viewMode=tglBtn.dataset.mode;
    render();
    return;
  }
  const niBtn=e.target.closest('.ni');
  if(niBtn){
    const mk=niBtn.dataset.m;
    const el=document.getElementById('m-'+mk);
    if(el){
      window.scrollTo({top:el.getBoundingClientRect().top+window.scrollY-180,behavior:'smooth'});
    }
    return;
  }
  const mlsBar=e.target.closest('#mlsBar');
  if(mlsBar){
    mlsOpen=!mlsOpen;
    mlsBar.classList.toggle('open',mlsOpen);
    document.getElementById('ms').classList.toggle('open',mlsOpen);
    return;
  }
  const itEl=e.target.closest('.it');
  if(itEl){
    const idx=parseInt(itEl.dataset.idx);
    if(!isNaN(idx))tog(idx);
    return;
  }
  if(e.target.id==='resetBtn'){resetAll();return}
  if(e.target.id==='shareBtn'){shareUrl();return}
  if(e.target.id==='tp'){window.scrollTo({top:0,behavior:'smooth'});return}
});

window.addEventListener('scroll',function(){
  document.getElementById('tp').classList.toggle('show',window.scrollY>400);
});

applyTheme();
render();
