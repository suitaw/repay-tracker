.hero-l{font-size:11px;color:rgba(0,0,0,0.55);margin-top:6px;letter-spacing:2px;text-transform:uppercase;font-weight:700;position:relative}

.row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}

.pbf{height:100%;background:var(--onY);border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}

    mmap[mk].sort().forEach(w=>{
      const items=weeks[w],we=new Date(w);we.setDate(we.getDate()+6);const wes=we.toISOString().slice(0,10),wt=items.reduce((s,d)=>s+d.a,0);
      h+=`<div class="wk"><div class="wkh"><span class="wkr">${fm(w)} — ${fm(wes)}</span><span class="wka" data-w="${w}">¥${wt.toFixed(0)}</span></div>`;
      items.forEach(it=>{
        const dt=new Date(it.d),wd=WD[dt.getDay()],on=ck[it.i];let tag='';
        if(it.t){const tc=it.t.includes('最后')||it.t.includes('结清')?'te':'tf';tag=`<span class="itg ${tc}">${it.t}</span>`}
        h+=`<div class="it${on?' dn':''}" id="r-${it.i}" onclick="tog(${it.i})"><div class="ck${on?' on':''}" id="c-${it.i}"></div><div class="ib"><div class="itp"><span class="idt">${fm(it.d)}</span><span class="idy">周${wd}</span>${tag}</div><div class="is"><span class="dt ${DC[it.s]||''}"></span>${it.s}</div></div><div class="ia ${AC[it.s]||''}">¥${it.a.toFixed(2)}</div></div>`});
      h+=`</div>`});h+=`</div>`});
  app.innerHTML=h;
  document.getElementById('nv').innerHTML=months.map(mk=>{const[y,m]=mk.split('-');const yr=y==='2027'?"'27 ":'';return`<button class="ni" data-m="${mk}" onclick="goM('${mk}')">${yr}${+m}月</button>`}).join('');
  upd();updN();
}
function goM(mk){const el=document.getElementById('m-'+mk);if(el){const off=document.getElementById('hd').offsetHeight+document.getElementById('nv').offsetHeight+10;window.scrollTo({top:el.getBoundingClientRect().top+window.scrollY-off,behavior:'smooth'})}}
function updN(){const btns=document.querySelectorAll('.ni'),off=document.getElementById('hd').offsetHeight+document.getElementById('nv').offsetHeight+60;let ac=null;document.querySelectorAll('.sec[id^="m-"]').forEach(s=>{if(s.getBoundingClientRect().top<off+100)ac=s.id.replace('m-','')});btns.forEach(b=>b.classList.toggle('on',b.dataset.m===ac));const ab=document.querySelector('.ni.on');if(ab){const n=document.getElementById('nv');n.scrollTo({left:ab.offsetLeft-n.offsetWidth/2+ab.offsetWidth/2,behavior:'smooth'})}}
let st;window.addEventListener('scroll',()=>{clearTimeout(st);st=setTimeout(updN,50);document.getElementById('tp').classList.toggle('show',window.scrollY>400)});
render();
</script>
</body>
