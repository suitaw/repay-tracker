<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fafaf9;
  --card:#ffffff;
  --border:#e7e5e4;
  --border-soft:#f5f5f4;
  --text:#1c1917;
  --text2:#78716c;
  --text3:#a8a29e;
  --text-mute:#d6d3d1;
  --hd-bg:rgba(250,250,249,0.92);
  --nv-bg:rgba(250,250,249,0.95);
  --chip:#f5f5f4;
  --today-bg:linear-gradient(90deg,#fffbeb,#fff 100%);
  --today-tag-bg:#dbeafe;
  --today-tag-c:#1d4ed8;
  --od-bg:linear-gradient(90deg,#fef2f2,#fff 100%);
  --od-tag-bg:#fef2f2;
  --od-tag-c:#dc2626;
  --od-card-bg:#fef2f2;
  --od-card-border:#fecaca;
  --od-card-text:#991b1b;
  --done-bg:#f0fdf4;
  --done-border:#bbf7d0;
  --done-c:#16a34a;
  --bar-empty:#f5f5f4;
  --bar-fill:#1c1917;
  --dot:#ff8c2e;
  --soon-bg:#fef2f2;
  --r:14px;
}
[data-theme="dark"]{
  --bg:#0c0a09;
  --card:#1c1917;
  --border:#292524;
  --border-soft:#1c1917;
  --text:#fafaf9;
  --text2:#a8a29e;
  --text3:#78716c;
  --text-mute:#44403c;
  --hd-bg:rgba(12,10,9,0.92);
  --nv-bg:rgba(12,10,9,0.95);
  --chip:#292524;
  --today-bg:linear-gradient(90deg,rgba(245,158,11,0.15),transparent);
  --today-tag-bg:rgba(59,130,246,0.2);
  --today-tag-c:#93c5fd;
  --od-bg:linear-gradient(90deg,rgba(220,38,38,0.15),transparent);
  --od-tag-bg:rgba(220,38,38,0.2);
  --od-tag-c:#fca5a5;
  --od-card-bg:rgba(220,38,38,0.1);
  --od-card-border:rgba(220,38,38,0.3);
  --od-card-text:#fca5a5;
  --done-bg:rgba(34,197,94,0.1);
  --done-border:rgba(34,197,94,0.3);
  --done-c:#86efac;
  --bar-empty:#292524;
  --bar-fill:#fafaf9;
  --soon-bg:rgba(220,38,38,0.15);
}
body{
  font-family:'DM Sans',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;padding-bottom:120px;font-size:15px;line-height:1.5;
  transition:background .2s,color .2s;
}

.hd{position:sticky;top:0;z-index:100;background:var(--hd-bg);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:8px 16px 8px}
.brand-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.brand{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:4px;text-transform:uppercase;color:var(--text3);flex:1;text-align:center}
.theme-toggle{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:var(--chip);border:none;border-radius:50%;cursor:pointer;font-size:18px;color:var(--text2);position:relative;line-height:1;font-weight:700;letter-spacing:-2px;padding-bottom:4px}

.hero{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:6px;position:relative}
.hero-top{display:flex;align-items:flex-end;justify-content:space-between;gap:12px}
.hero-left{flex:1;text-align:left}
.hero-n{font-family:'DM Mono',monospace;font-size:32px;font-weight:800;letter-spacing:-1.5px;color:var(--text);line-height:1}
.hero-n .u{font-size:18px;font-weight:500;opacity:.4;margin-right:1px}
.hero-l{font-size:9px;color:var(--text3);margin-top:2px;letter-spacing:2px;text-transform:uppercase;font-weight:700}
.hero-expand{background:var(--chip);border:none;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:10px;cursor:pointer;flex-shrink:0}
.hero.expanded .hero-expand{transform:rotate(180deg)}

.nextpay{margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);display:flex;justify-content:space-between;align-items:center;font-size:12px;gap:8px}

.expand-content{display:none;padding-top:8px;margin-top:8px;border-top:1px dashed var(--border)}
.hero.expanded .expand-content{display:block}

.menu-pop{position:absolute;top:48px;right:12px;background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,0.12);min-width:180px;z-index:200;overflow:hidden;display:none}
.menu-pop.show{display:block}
.menu-item{display:flex;align-items:center;gap:10px;padding:11px 14px;font-size:13px;color:var(--text);cursor:pointer;-webkit-user-select:none;user-select:none;border-bottom:1px solid var(--border-soft)}
.menu-item:last-child{border-bottom:none}
.menu-item:active{background:var(--chip)}
.menu-item.danger{color:#dc2626}
[data-theme="dark"] .menu-item.danger{color:#fca5a5}
.menu-icon{font-size:14px;width:18px;display:flex;justify-content:center;flex-shrink:0}
.menu-text{flex:1}

.nextpay-info{display:flex;align-items:center;gap:6px;flex:1;flex-wrap:wrap;justify-content:flex-start}
.nextpay-l{color:var(--text2);font-weight:600;flex-shrink:0}
.nextpay-r{font-family:'DM Mono',monospace;font-weight:700;color:var(--text);display:inline-flex;align-items:center;gap:6px;flex-wrap:wrap}
.nextpay-r .npd{color:#dc2626;font-weight:700}
[data-theme="dark"] .nextpay-r .npd{color:#fca5a5}
.nextpay-r .npd.soon{background:var(--soon-bg);padding:2px 6px;border-radius:4px}
.np-check{width:30px;height:30px;border-radius:50%;border:2px solid var(--done-c);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:var(--done-c);font-weight:800;font-size:14px;transition:all .2s}
.np-check:active{transform:scale(.9);background:var(--done-c);color:#fff}

.row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center}
.box-v{font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:var(--text)}
.box-l{font-size:10px;color:var(--text3);margin-top:1px;font-weight:600}

.month-mini{margin-top:4px;height:3px;background:var(--bar-empty);border-radius:2px;overflow:hidden;margin-left:4px;margin-right:4px}
.month-mini-fill{height:100%;background:var(--bar-fill);border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1)}

.pw{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 12px}
.pb{height:5px;background:var(--bar-empty);border-radius:3px;overflow:hidden}
.pbf{height:100%;background:var(--bar-fill);border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.pi{display:flex;justify-content:space-between;margin-top:4px;font-family:'DM Mono',monospace;font-size:10px;color:var(--text3)}

.upcoming{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-top:8px}
.upcoming-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.upcoming-t{font-size:10px;letter-spacing:1px;font-weight:700;color:var(--text3);text-transform:uppercase}
.upcoming-sub{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}
.upcoming-list{display:flex;flex-direction:column}
.up-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border-soft);font-size:12px}
.up-row:last-child{border-bottom:none}
.up-row.dn{opacity:.35}
.up-row.dn .up-amt{text-decoration:line-through}
.up-row.today{background:linear-gradient(90deg,rgba(245,158,11,0.12),transparent);margin:0 -12px;padding-left:12px;padding-right:12px;border-bottom-color:transparent}
.up-ck{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--text-mute);flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--card);pointer-events:none}
.up-ck.on{border-color:#16a34a;background:#16a34a}
.up-ck.on::after{content:'';width:3px;height:6px;border:solid #fff;border-width:0 1.5px 1.5px 0;transform:rotate(45deg);margin-top:-1px}
.up-date{font-family:'DM Mono',monospace;font-weight:700;color:var(--text);min-width:36px;pointer-events:none}
.up-wd{color:var(--text3);font-weight:600;font-size:11px;pointer-events:none}
.up-tag{font-size:9px;padding:1px 6px;border-radius:3px;font-weight:700;background:var(--today-tag-bg);color:var(--today-tag-c);pointer-events:none}
.up-amt{flex:1;text-align:right;font-family:'DM Mono',monospace;font-weight:700;color:var(--text);pointer-events:none}
.up-empty{text-align:center;padding:14px 0;color:var(--text3);font-size:12px}

.tgl{display:flex;justify-content:center;gap:8px;padding:8px 16px 4px;background:var(--nv-bg)}
.tgl-btn{padding:5px 12px;border:1px solid var(--border);background:var(--card);border-radius:100px;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif}
.tgl-btn.on{background:var(--text);color:var(--bg);border-color:var(--text)}

.nv{display:flex;gap:4px;padding:6px 16px 8px;overflow-x:auto;scrollbar-width:none;background:var(--nv-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nv::-webkit-scrollbar{display:none}
.ni{flex-shrink:0;padding:6px 14px;border-radius:100px;border:none;background:var(--chip);color:var(--text3);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.ni.on{background:var(--text);color:var(--bg)}

.pf{display:flex;gap:6px;padding:2px 16px 8px;overflow-x:auto;scrollbar-width:none;background:var(--nv-bg)}
.pf::-webkit-scrollbar{display:none}
.pfb{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:4px 10px 4px 4px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--text3);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.pfb.on{background:var(--pc-bg,var(--chip));border-color:var(--pc,var(--text));color:var(--text)}
.pfb[data-p="all"].on{background:var(--text);color:var(--bg)}
.pfb-amt{font-family:'DM Mono',monospace;font-weight:600;opacity:.65;font-size:10px}

.pico{display:flex;align-items:center;justify-content:center;flex-shrink:0;border-radius:5px;font-weight:800;line-height:1;letter-spacing:-.3px;border:1px solid rgba(0,0,0,.06)}
[data-theme="dark"] .pico{border-color:rgba(255,255,255,.1)}

.alert{padding:0 16px 8px}
.alert-card{background:var(--od-card-bg);border:1px solid var(--od-card-border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px}
.alert-icon{font-size:18px}
.alert-text{flex:1;font-size:13px;font-weight:600;color:var(--od-card-text)}
.alert-count{font-family:'DM Mono',monospace;font-size:12px;color:var(--od-tag-c);font-weight:700}

.sec{padding:0 16px;margin-bottom:4px}
.sh{display:flex;align-items:center;gap:10px;padding:20px 0 10px}
.sm{font-size:24px;font-weight:800;letter-spacing:-.5px;color:var(--text);line-height:1}
.st2{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:var(--text2);background:var(--chip);padding:3px 12px;border-radius:100px;font-variant-numeric:tabular-nums}

.wk{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:14px;overflow:hidden}
.wkh{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border-soft)}
.wkr{font-size:13px;color:var(--text2);font-weight:700;font-variant-numeric:tabular-nums}
.wka{font-family:'DM Mono',monospace;font-size:15px;font-weight:800;color:var(--text);font-variant-numeric:tabular-nums}

.it{display:flex;align-items:center;padding:14px 16px;gap:12px;border-bottom:1px solid var(--border-soft);transition:all .2s;cursor:pointer;-webkit-user-select:none;user-select:none;min-height:60px}
.it:last-child{border-bottom:none}
.it:active{background:var(--chip)}
.it.dn{opacity:.35}
.it.dn .ia{text-decoration:line-through}
.it.today{background:var(--today-bg);border-left:3px solid #f59e0b}
.it.today.dn{background:transparent;border-left:none}
.it.overdue{background:var(--od-bg);border-left:3px solid #dc2626}
.it.overdue.dn{background:transparent;border-left:none}

.ck{width:26px;height:26px;border-radius:50%;border:2px solid var(--text-mute);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;background:var(--card);pointer-events:none}
.ck.on{border-color:#16a34a;background:#16a34a}
.ck.on::after{content:'';width:6px;height:10px;border:solid #fff;border-width:0 2.5px 2.5px 0;transform:rotate(45deg);margin-top:-2px}

.ib{flex:1;min-width:0;pointer-events:none}
.itp{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.idt{font-size:14px;font-weight:700;color:var(--text)}
.idy{font-size:12px;color:var(--text3);font-weight:600}
.itg{font-size:9px;padding:2px 7px;border-radius:4px;font-weight:700;letter-spacing:.3px}
.tt{background:var(--today-tag-bg);color:var(--today-tag-c)}
.te{background:var(--done-bg);color:var(--done-c)}
.tov{background:var(--od-tag-bg);color:var(--od-tag-c)}

.is{font-size:12px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:5px;font-weight:600}
.dt.pico{width:18px;height:18px;font-size:8px}

.ia{font-family:'DM Mono',monospace;font-size:16px;font-weight:700;color:var(--text);flex-shrink:0;pointer-events:none;font-variant-numeric:tabular-nums}

.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-i{font-size:48px;margin-bottom:12px}
.empty-t{font-size:14px;font-weight:600}

.rst{display:block;margin:40px auto 20px;padding:13px 32px;background:var(--card);color:#dc2626;border:1px solid var(--border);border-radius:100px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer}
[data-theme="dark"] .rst{color:#fca5a5}
.shr{display:block;margin:10px auto;padding:11px 28px;background:var(--text);color:var(--bg);border:none;border-radius:100px;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer}
.top{position:fixed;bottom:28px;right:20px;width:48px;height:48px;border-radius:50%;background:var(--text);color:var(--bg);font-size:20px;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,0.15);opacity:0;pointer-events:none;transition:all .3s;border:none}
.top.show{opacity:1;pointer-events:auto}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:100px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:all .3s;z-index:300}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.undo-bar{position:fixed;bottom:90px;left:16px;right:16px;background:var(--text);color:var(--bg);padding:12px 16px;border-radius:14px;display:flex;align-items:center;gap:12px;opacity:0;transform:translateY(20px);pointer-events:none;transition:all .3s;z-index:300;box-shadow:0 8px 24px rgba(0,0,0,0.2)}
.undo-bar.show{opacity:1;transform:translateY(0);pointer-events:auto}
.undo-bar-info{flex:1;font-size:13px;font-weight:600}
.undo-bar-amt{font-family:'DM Mono',monospace;opacity:.7;margin-left:6px;font-size:12px}
.undo-bar-btn{background:transparent;border:1.5px solid var(--bg);color:var(--bg);padding:5px 14px;border-radius:100px;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
.undo-bar-btn:active{opacity:.7}

/* 撒花动画 */
.confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1000;display:none}
.confetti.show{display:block}
.cfp{position:absolute;width:8px;height:8px;animation:cfall 2s ease-in forwards}
@keyframes cfall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<div class="hd">
<div class="brand-row">
  <div style="width:28px"></div>
  <div class="brand">Payoff</div>
  <button class="theme-toggle" id="menuToggle" title="菜单">⋮</button>
  <div class="menu-pop" id="menuPop">
    <div class="menu-item" id="menuTheme"><span class="menu-icon">☾</span><span class="menu-text">切换主题</span></div>
    <div class="menu-item" id="menuShare"><span class="menu-icon">🔗</span><span class="menu-text">复制带进度的链接</span></div>
    <div class="menu-item danger" id="menuReset"><span class="menu-icon">↺</span><span class="menu-text">重置所有记录</span></div>
  </div>
</div>
<div class="hero" id="hero">
  <div class="hero-top">
    <div class="hero-left">
      <div class="hero-n"><span class="u">¥</span><span id="hA">0</span></div>
      <div class="hero-l">剩余待还</div>
    </div>
    <button class="hero-expand" id="heroExpand" title="展开/收起详情">▼</button>
  </div>
  <div class="nextpay" id="nextpay" style="display:none">
    <div class="nextpay-info">
      <span class="nextpay-l">下一笔</span>
      <span class="nextpay-r" id="nextpayInfo"></span>
    </div>
    <button class="np-check" id="npCheck" title="勾选下一笔">✓</button>
  </div>
  <div class="expand-content">
    <div class="row">
      <div class="box">
        <div class="box-v" id="sP">¥0</div>
        <div class="box-l">已还</div>
      </div>
      <div class="box">
        <div class="box-v" id="sW">¥0</div>
        <div class="box-l">本周剩余</div>
      </div>

function decodeFromUrl(){
  try{
    const u=new URL(location.href);
    const s=u.searchParams.get('s');
    if(!s)return null;
    const bits=[];
    for(let i=0;i<s.length;i++){
      const v=parseInt(s[i],36);
      for(let j=0;j<5;j++){bits.push((v>>j)&1)}
    }
    const obj={};
    for(let i=0;i<D.length;i++)if(bits[i])obj[i]=true;
    return obj;
  }catch(e){return null}
}
function encodeToUrl(){
  const bits=[];
  for(let i=0;i<D.length;i++)bits.push(ck[i]?1:0);
  let s='';
  for(let i=0;i<bits.length;i+=5){
    let v=0;
    for(let j=0;j<5;j++)v|=(bits[i+j]||0)<<j;
    s+=v.toString(36);
  }
  return s;
}
function updateUrl(){
  try{
    const s=encodeToUrl();
    const u=new URL(location.href);
    if(s.replace(/0+$/,''))u.searchParams.set('s',s);
    else u.searchParams.delete('s');
    history.replaceState(null,'',u.toString());
  }catch(e){}
}

function fmtDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function wk(ds){
  const d=new Date(ds+'T00:00:00');
  const w=d.getDay();
  const df=(w<4)?-(w+3):-(w-4);
  d.setDate(d.getDate()+df);
  return fmtDate(d);
}
function fm(ds){const[y,m,d]=ds.split('-');return`${+m}/${+d}`}
function gm(ds){return ds.slice(0,7)}
function daysBetween(a,b){const da=new Date(a+'T00:00:00'),db=new Date(b+'T00:00:00');return Math.round((db-da)/86400000)}
function vibrate(ms){try{if(navigator.vibrate)navigator.vibrate(ms)}catch(e){}}

// 数字滚动动画
function animateNumber(el,from,to,duration){
  const start=performance.now();
  const diff=to-from;
  function step(now){
    const t=Math.min(1,(now-start)/duration);
    const eased=1-Math.pow(1-t,3);
    el.textContent=Math.round(from+diff*eased).toString();
    if(t<1)requestAnimationFrame(step);
    else el.textContent=Math.round(to).toString();
  }
  requestAnimationFrame(step);
}

let lastRem=null,lastPaid=null;
function updStats(animate){
  const tot=D.reduce((s,d)=>s+d.a,0);
  let paid=0,pc=0;
  D.forEach((d,i)=>{if(ck[i]){paid+=d.a;pc++}});
  const rem=tot-paid,now=new Date(),cm=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  let mTot=0,mPaid=0;
  D.forEach((d,i)=>{if(gm(d.d)===cm){mTot+=d.a;if(ck[i])mPaid+=d.a}});
  const mRem=mTot-mPaid;

  const hAEl=document.getElementById('hA'),sPEl=document.getElementById('sP');
  if(animate&&lastRem!==null){
    animateNumber(hAEl,lastRem,Math.round(rem),500);
    animateNumber({set textContent(v){sPEl.textContent='¥'+v}},lastPaid,Math.round(paid),500);
  }else{
    hAEl.textContent=Math.round(rem);
    sPEl.textContent='¥'+Math.round(paid);
  }
  lastRem=Math.round(rem);lastPaid=Math.round(paid);

  document.getElementById('sM').textContent='¥'+mRem.toFixed(0);
  document.getElementById('mMiniBar').style.width=(mTot>0?(mPaid/mTot*100):0)+'%';

  // 本周剩余：今天所在的"周四到下周三"周期内未还
  // 用已有的 wk() 函数：返回当前所在周的周四日期
  const weekStart=wk(TODAY);
  const weekEndD=new Date(weekStart+'T00:00:00');weekEndD.setDate(weekEndD.getDate()+6);
  const weekEnd=fmtDate(weekEndD);
  let wRem=0;
  D.forEach((d,i)=>{if(!ck[i]&&d.d>=TODAY&&d.d<=weekEnd)wRem+=d.a});
  document.getElementById('sW').textContent='¥'+wRem.toFixed(0);
  // 第三个卡：距结清天数 / 已完成
  const sCEl=document.getElementById('sC');
  const sCLabelEl=document.getElementById('sCLabel');
  if(pc===D.length){
    sCEl.textContent='✓';
    sCLabelEl.textContent='已结清';
  }else{
    // 找最后一笔未还的日期
    let lastDate=null;
    for(let i=D.length-1;i>=0;i--){if(!ck[i]){lastDate=D[i].d;break}}
    if(lastDate){
      const days=Math.max(0,daysBetween(TODAY,lastDate));
      sCEl.textContent=days;
      sCLabelEl.textContent='天后结清';
    }else{
      sCEl.textContent='0';
      sCLabelEl.textContent='距结清';
    }
  }
  const pct=paid/tot*100;
  document.getElementById('pB').style.width=pct+'%';
  document.getElementById('pP').textContent=pct.toFixed(1)+'%';
  document.getElementById('pL').textContent=pc+'/'+D.length;

  // 下一笔
  const np=document.getElementById('nextpay');
  const npInfo=document.getElementById('nextpayInfo');
  const npCheck=document.getElementById('npCheck');
  let nextItem=null;
  for(let i=0;i<D.length;i++){
    if(!ck[i]&&D[i].d>=TODAY){nextItem={...D[i],i};break}
  }
  if(nextItem){
    const days=daysBetween(TODAY,nextItem.d);
    const wd=WD[new Date(nextItem.d+'T00:00:00').getDay()];
    let dayLabel;
    if(days===0)dayLabel='<span class="npd soon">就在今天</span>';
    else if(days===1)dayLabel='<span class="npd">明天</span>';
    else if(days<=3)dayLabel=`<span class="npd soon">${days} 天后</span>`;
    else dayLabel=`<span style="color:var(--text2)">${days} 天后</span>`;
    npInfo.innerHTML=`${dayLabel} ${fm(nextItem.d)} 周${wd} · ¥${nextItem.a.toFixed(2)}`;
    np.style.display='flex';
    npCheck.dataset.idx=nextItem.i;
  }else{
    np.style.display='none';
  }

  let overdueCount=0,overdueAmt=0;
  D.forEach((d,i)=>{if(!ck[i]&&d.d<TODAY){overdueCount++;overdueAmt+=d.a}});
  const ab=document.getElementById('alertBox');
  if(overdueCount>0){
    ab.style.display='block';
    ab.innerHTML=`<div class="alert-card"><span class="alert-icon">⚠️</span><span class="alert-text">有 ${overdueCount} 期逾期未还</span><span class="alert-count">¥${overdueAmt.toFixed(0)}</span></div>`;
  }else{
    ab.style.display='none';
  }

  renderUpcoming();
}

function render(animate){
  updStats(animate);
  renderPlatformFilter();
  const visibleItems=D.map((d,i)=>({...d,i})).filter(shouldShow);

  const weeks={};
  visibleItems.forEach(it=>{
    const w=wk(it.d);
    if(!weeks[w])weeks[w]=[];
    weeks[w].push(it);
  });

  const mmap={};
  Object.keys(weeks).forEach(w=>{
    const m=weekToMonth(w);
    if(!mmap[m])mmap[m]=[];
    mmap[m].push(w);
  });

  const app=document.getElementById('app'),months=Object.keys(mmap).sort();
  if(months.length===0){
    app.innerHTML=`<div class="empty"><div class="empty-i">🎉</div><div class="empty-t">没有待还的款项了</div></div>`;
    document.getElementById('nv').innerHTML='';
    return;
  }
  let h='';
  months.forEach(mk=>{
    const[y,m]=mk.split('-');
    const yr=y==='2027'?"'27 ":'';
    const ml=`${yr}${+m}月`;
    let mt=0;
    mmap[mk].forEach(w=>{
      weeks[w].forEach(it=>{if(!ck[it.i])mt+=it.a});
    });
    const mLabel=mt>0?`¥${mt.toFixed(0)}`:'已完成';
    h+=`<div class="sec" id="m-${mk}"><div class="sh"><span class="sm">${ml}</span><span class="st2">${mLabel}</span></div>`;
    mmap[mk].sort().forEach(w=>{
      const items=weeks[w];
      const we=new Date(w+'T00:00:00');
      we.setDate(we.getDate()+6);
      const wes=fmtDate(we);
      const wt=items.filter(it=>!ck[it.i]).reduce((s,d)=>s+d.a,0);
      h+=`<div class="wk"><div class="wkh"><span class="wkr">${fm(w)} — ${fm(wes)}</span><span class="wka">¥${wt.toFixed(0)}</span></div>`;
      items.forEach(it=>{
        const dt=new Date(it.d+'T00:00:00'),wd=WD[dt.getDay()];
        const status=getStatus(it),on=ck[it.i];
        let cls='it';
        if(on)cls+=' dn';
        if(status==='today')cls+=' today';
        else if(status==='overdue')cls+=' overdue';
        let tag='';
        if(status==='today')tag=`<span class="itg tt">今天</span>`;
        else if(status==='overdue')tag=`<span class="itg tov">逾期</span>`;
        else if(it.t)tag=`<span class="itg te">${it.t}</span>`;
        const ic=iconOf(it.p);
        h+=`<div class="${cls}" data-idx="${it.i}"><div class="ck${on?' on':''}"></div><div class="ib"><div class="itp"><span class="idt">${fm(it.d)}</span><span class="idy">周${wd}</span>${tag}</div><div class="is"><span class="dt pico" style="background:${ic.bg};color:${ic.fg}">${ic.label}</span>${it.p}</div></div><div class="ia">¥${it.a.toFixed(2)}</div></div>`;
      });
      h+=`</div>`;
    });
    h+=`</div>`;
  });
  app.innerHTML=h;
  document.getElementById('nv').innerHTML=months.map(mk=>{
    const[y,m]=mk.split('-');
    const yr=y==='2027'?"'27 ":'';
    return`<button class="ni" data-m="${mk}">${yr}${+m}月</button>`;
  }).join('');
}

document.body.addEventListener('click',function(e){
  // 展开/收起详情
  if(e.target.id==='heroExpand'){
    const hero=document.getElementById('hero');
    hero.classList.toggle('expanded');
    localStorage.setItem('po-expanded',hero.classList.contains('expanded')?'1':'0');
    return;
  }
  // 菜单切换
  if(e.target.id==='menuToggle'){
    e.stopPropagation();
    document.getElementById('menuPop').classList.toggle('show');
    return;
  }
  // 菜单项：切换主题
  if(e.target.closest('#menuTheme')){
    theme=theme==='dark'?'light':'dark';
    localStorage.setItem('po-theme',theme);
    applyTheme();
    document.getElementById('menuPop').classList.remove('show');
    return;
  }
  // 菜单项：分享
  if(e.target.closest('#menuShare')){
    shareUrl();
    document.getElementById('menuPop').classList.remove('show');
    return;
  }
  // 菜单项：重置
  if(e.target.closest('#menuReset')){
    document.getElementById('menuPop').classList.remove('show');
    resetAll();
    return;
  }
  // 点别处关菜单
  if(!e.target.closest('#menuPop')){
    document.getElementById('menuPop').classList.remove('show');
  }
  // 快速勾选下一笔
  if(e.target.id==='npCheck'){
    const idx=parseInt(e.target.dataset.idx);
    if(!isNaN(idx)){
      const item=D[idx];
      tog(idx);
      // 显示撤销提示
      if(ck[idx])showUndo(idx,item.a,item.d);
    }
    return;
  }
  // 撤销按钮
  if(e.target.id==='undoBtn'){
    doUndo();
    return;
  }
  const tglBtn=e.target.closest('.tgl-btn');
  if(tglBtn){
    document.querySelectorAll('.tgl-btn').forEach(b=>b.classList.remove('on'));
    tglBtn.classList.add('on');
    viewMode=tglBtn.dataset.mode;
    render();
    return;
  }
  const pfBtn=e.target.closest('.pfb');
  if(pfBtn){
    platformMode=pfBtn.dataset.p;
    render();
    return;
  }
  const niBtn=e.target.closest('.ni');
  if(niBtn){
    const mk=niBtn.dataset.m;
    const el=document.getElementById('m-'+mk);
    if(el){
      window.scrollTo({top:el.getBoundingClientRect().top+window.scrollY-180,behavior:'smooth'});
    }
    return;
  }
  const upRow=e.target.closest('.up-row');
  if(upRow){
    // 未来7天清单不响应点击，避免误触；主列表才能勾选
    return;
  }
  const itEl=e.target.closest('.it');
  if(itEl){
    const idx=parseInt(itEl.dataset.idx);
    if(!isNaN(idx))tog(idx);
    return;
  }
  if(e.target.id==='tp'){window.scrollTo({top:0,behavior:'smooth'});return}
});

window.addEventListener('scroll',function(){
  document.getElementById('tp').classList.toggle('show',window.scrollY>400);
});

// 长按主列表条目：批量勾选此项及之前所有未勾选项
let pressTimer=null;
let pressActioned=false;
document.body.addEventListener('touchstart',function(e){
  const itEl=e.target.closest('.it');
  if(!itEl)return;
  const idx=parseInt(itEl.dataset.idx);
  if(isNaN(idx))return;
  pressActioned=false;
  pressTimer=setTimeout(()=>{
    pressActioned=true;
    // 统计 idx 及之前所有未勾选项
    const targets=[];
    for(let i=0;i<=idx;i++){if(!ck[i])targets.push(i)}
    if(targets.length===0)return;
    if(targets.length===1){
      // 只有自己一项，按普通勾选处理
      tog(idx);
      return;
    }
    if(confirm(`确认勾选 ${fm(D[idx].d)} 及之前 ${targets.length} 项未还款？`)){
      targets.forEach(i=>{ck[i]=true});
      vibrate([20,30,20]);
      sv();
      render(true);
      showToast(`已批量勾选 ${targets.length} 项`);
    }
  },600);
},{passive:true});
document.body.addEventListener('touchend',function(){
  if(pressTimer)clearTimeout(pressTimer);
  pressTimer=null;
},{passive:true});
document.body.addEventListener('touchmove',function(){
  if(pressTimer)clearTimeout(pressTimer);
  pressTimer=null;
},{passive:true});
// 鼠标右键也触发批量（桌面端）
document.body.addEventListener('contextmenu',function(e){
  const itEl=e.target.closest('.it');
  if(!itEl)return;
  e.preventDefault();
  const idx=parseInt(itEl.dataset.idx);
  if(isNaN(idx))return;
  const targets=[];
  for(let i=0;i<=idx;i++){if(!ck[i])targets.push(i)}
  if(targets.length<=1){
    if(targets.length===1)tog(idx);
    return;
  }
  if(confirm(`确认勾选 ${fm(D[idx].d)} 及之前 ${targets.length} 项未还款？`)){
    targets.forEach(i=>{ck[i]=true});
    vibrate([20,30,20]);
    sv();
    render(true);
    showToast(`已批量勾选 ${targets.length} 项`);
  }
});

// 防止长按触发的点击事件
document.body.addEventListener('click',function(e){
  if(pressActioned){
    pressActioned=false;
    e.stopPropagation();
    e.preventDefault();
  }
},true);

applyTheme();
if(localStorage.getItem('po-expanded')==='1'){
  document.getElementById('hero').classList.add('expanded');
}
render();
</script>
