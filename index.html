<html lang="zh-CN">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PAYOFF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fafaf9;
  --text:#1c1917;
  --text2:#78716c;
  --text3:#a8a29e;
  --r:14px;
}
body{
  font-family:'DM Sans',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;padding-bottom:120px;font-size:15px;line-height:1.5;
}

.hd{position:sticky;top:0;z-index:100;background:rgba(250,250,249,0.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid #e7e5e4;padding:14px 16px 12px}
.brand{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:5px;text-transform:uppercase;color:#a8a29e;text-align:center;margin-bottom:12px}

.hero{background:#fff;border:1px solid #e7e5e4;border-radius:16px;padding:22px 16px;text-align:center;margin-bottom:10px}
.hero-n{font-family:'DM Mono',monospace;font-size:48px;font-weight:800;letter-spacing:-2px;color:#1c1917;line-height:1}
.hero-n .u{font-size:24px;font-weight:500;opacity:.4;margin-right:2px}
.hero-l{font-size:11px;color:#a8a29e;margin-top:6px;letter-spacing:2px;text-transform:uppercase;font-weight:700}

.row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.box{background:#fff;border:1px solid #e7e5e4;border-radius:12px;padding:12px 6px;text-align:center}
.box-v{font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:#1c1917}
.box-l{font-size:10px;color:#a8a29e;margin-top:2px;font-weight:600}

.pw{background:#fff;border:1px solid #e7e5e4;border-radius:10px;padding:10px 14px}
.pb{height:6px;background:#f5f5f4;border-radius:3px;overflow:hidden}
.pbf{height:100%;background:#1c1917;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.pi{display:flex;justify-content:space-between;margin-top:5px;font-family:'DM Mono',monospace;font-size:11px;color:#a8a29e}

.tgl{display:flex;justify-content:center;gap:8px;padding:8px 16px;background:rgba(250,250,249,0.95);border-bottom:1px solid #e7e5e4}
.tgl-btn{padding:6px 14px;border:1px solid #e7e5e4;background:#fff;border-radius:100px;font-size:12px;font-weight:600;color:#78716c;cursor:pointer;font-family:'DM Sans',sans-serif}
.tgl-btn.on{background:#1c1917;color:#fff;border-color:#1c1917}

.nv{display:flex;gap:4px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;background:rgba(250,250,249,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid #e7e5e4}
.nv::-webkit-scrollbar{display:none}
.ni{flex-shrink:0;padding:7px 18px;border-radius:100px;border:none;background:#f5f5f4;color:#a8a29e;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.ni.on{background:#1c1917;color:#fff}

.mls{padding:10px 16px 4px}
.ml{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#fff;border:1px solid #e7e5e4;border-radius:12px;margin-bottom:6px;transition:all .3s}
.ml.dn{background:#f0fdf4;border-color:#bbf7d0}
.ml.dn .mlt{color:#a8a29e;text-decoration:line-through}
.ml.dn .mld{color:#a8a29e}
.mli{font-size:16px;flex-shrink:0}
.mlt{flex:1;font-size:13px;font-weight:700;color:#1c1917}
.mld{font-family:'DM Mono',monospace;font-size:12px;color:#a8a29e}

.alert{padding:0 16px 8px}
.alert-card{background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px}
.alert-icon{font-size:18px}
.alert-text{flex:1;font-size:13px;font-weight:600;color:#991b1b}
.alert-count{font-family:'DM Mono',monospace;font-size:12px;color:#dc2626;font-weight:700}

.sec{padding:0 16px;margin-bottom:4px}
.sh{display:flex;align-items:baseline;gap:10px;padding:20px 0 10px}
.sm{font-size:24px;font-weight:800;letter-spacing:-.5px;color:#1c1917}
.st2{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:#78716c;background:#f5f5f4;padding:3px 12px;border-radius:100px}

.wk{background:#fff;border:1px solid #e7e5e4;border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.wkh{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #f5f5f4}
.wkr{font-size:13px;color:#78716c;font-weight:700}
.wka{font-family:'DM Mono',monospace;font-size:15px;font-weight:800;color:#1c1917}

.it{display:flex;align-items:center;padding:14px 16px;gap:12px;border-bottom:1px solid #f5f5f4;transition:all .2s;cursor:pointer;-webkit-user-select:none;user-select:none;min-height:60px}
.it:last-child{border-bottom:none}
.it:active{background:#f5f5f4}
.it.dn{opacity:.35}
.it.dn .ia{text-decoration:line-through}
.it.today{background:linear-gradient(90deg,#fffbeb,#fff 100%);border-left:3px solid #f59e0b}
.it.today.dn{background:transparent;border-left:none}
.it.overdue{background:linear-gradient(90deg,#fef2f2,#fff 100%);border-left:3px solid #dc2626}
.it.overdue.dn{background:transparent;border-left:none}

.ck{width:26px;height:26px;border-radius:50%;border:2px solid #d6d3d1;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;background:#fff;pointer-events:none}
.ck.on{border-color:#16a34a;background:#16a34a}
.ck.on::after{content:'';width:6px;height:10px;border:solid #fff;border-width:0 2.5px 2.5px 0;transform:rotate(45deg);margin-top:-2px}

.ib{flex:1;min-width:0;pointer-events:none}
.itp{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.idt{font-size:14px;font-weight:700;color:#1c1917}
.idy{font-size:12px;color:#a8a29e;font-weight:600}
.itg{font-size:9px;padding:2px 7px;border-radius:4px;font-weight:700;letter-spacing:.3px}
.tt{background:#fef3c7;color:#b45309}
.te{background:#f0fdf4;color:#16a34a}
.tov{background:#fef2f2;color:#dc2626}

.is{font-size:12px;color:#a8a29e;margin-top:2px;display:flex;align-items:center;gap:5px;font-weight:600}
.dt{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:#ff8c2e}

.ia{font-family:'DM Mono',monospace;font-size:16px;font-weight:700;color:#1c1917;flex-shrink:0;pointer-events:none}

.empty{text-align:center;padding:60px 20px;color:#a8a29e}
.empty-i{font-size:48px;margin-bottom:12px}
.empty-t{font-size:14px;font-weight:600}

.rst{display:block;margin:40px auto 20px;padding:13px 32px;background:#fff;color:#dc2626;border:1px solid #e7e5e4;border-radius:100px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer}
.shr{display:block;margin:10px auto;padding:11px 28px;background:#1c1917;color:#fff;border:none;border-radius:100px;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer}
.top{position:fixed;bottom:28px;right:20px;width:48px;height:48px;border-radius:50%;background:#1c1917;color:#fff;font-size:20px;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,0.15);opacity:0;pointer-events:none;transition:all .3s;border:none}
.top.show{opacity:1;pointer-events:auto}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#1c1917;color:#fff;padding:10px 20px;border-radius:100px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:all .3s;z-index:300}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="hd">
<div class="brand">Payoff</div>
<div class="hero"><div class="hero-n"><span class="u">¥</span><span id="hA">0</span></div><div class="hero-l">剩余待还</div></div>
<div class="row">
<div class="box"><div class="box-v" id="sP">¥0</div><div class="box-l">已还</div></div>
<div class="box"><div class="box-v" id="sM">¥0</div><div class="box-l">本月</div></div>
<div class="box"><div class="box-v" id="sC">0</div><div class="box-l">进度</div></div>
</div>
<div class="pw"><div class="pb"><div class="pbf" id="pB"></div></div><div class="pi"><span id="pP">0%</span><span id="pL">0/0</span></div></div>
</div>
<div class="tgl">
  <button class="tgl-btn on" data-mode="active">仅待还</button>
  <button class="tgl-btn" data-mode="all">显示全部</button>

<div class="alert" id="alertBox" style="display:none"></div>
<div class="mls" id="ms"></div>
<div id="app"></div>

<button class="rst" id="resetBtn">重置所有记录</button>
<button class="top" id="tp">↑</button>

{d:"2027-05-19",a:375.93,t:"最后一期"}
];

const WD=['日','一','二','三','四','五','六'];
const TODAY=new Date().toISOString().slice(0,10);

const ML=[
  {n:10,i:"🚩",t:"完成 10 期"},
  {n:27,i:"🥉",t:"完成 1/4 (27 期)"},
  {n:54,i:"🥈",t:"完成 1/2 (54 期)"},
  {n:80,i:"🥇",t:"完成 3/4 (80 期)"},
  {n:97,i:"🔔",t:"还剩 10 期"},
  {n:107,i:"🎊",t:"全部结清"}
];

let viewMode='active';

function decodeFromUrl(){
  try{
    const u=new URL(location.href);
    const s=u.searchParams.get('s');
    if(!s)return null;
    const bits=[];
    for(let i=0;i<s.length;i++){
      const v=parseInt(s[i],36);
      for(let j=0;j<5;j++){bits.push((v>>j)&1)}
    }
    const obj={};
    for(let i=0;i<D.length;i++)if(bits[i])obj[i]=true;
    return obj;
  }catch(e){return null}
}
function encodeToUrl(){
  const bits=[];
  for(let i=0;i<D.length;i++)bits.push(ck[i]?1:0);
  let s='';
  for(let i=0;i<bits.length;i+=5){
    let v=0;
    for(let j=0;j<5;j++)v|=(bits[i+j]||0)<<j;
    s+=v.toString(36);
  }
  return s;
}
function updateUrl(){
  try{
    const s=encodeToUrl();
    const u=new URL(location.href);
    if(s.replace(/0+$/,''))u.searchParams.set('s',s);
    else u.searchParams.delete('s');
    history.replaceState(null,'',u.toString());
  }catch(e){}
}

let ck={};
const fromUrl=decodeFromUrl();
if(fromUrl){
  ck=fromUrl;
  try{localStorage.setItem('po6',JSON.stringify(ck))}catch(e){}
}else{
  try{ck=JSON.parse(localStorage.getItem('po6')||'{}')}catch(e){}
}

function sv(){
  try{localStorage.setItem('po6',JSON.stringify(ck))}catch(e){}
  updateUrl();
}
function wk(ds){const d=new Date(ds+'T00:00:00'),w=d.getDay(),df=(w<4)?-(w+3):-(w-4);const s=new Date(d);s.setDate(s.getDate()+df);return s.toISOString().slice(0,10)}
function fm(ds){const[y,m,d]=ds.split('-');return`${+m}/${+d}`}
function gm(ds){return ds.slice(0,7)}
function tog(i){
  ck[i]=!ck[i];
  if(!ck[i])delete ck[i];
  sv();
  render();
}
function resetAll(){if(confirm('确定清除所有记录？')){ck={};sv();render()}}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)}
function shareUrl(){
  updateUrl();
  const url=location.href;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(()=>showToast('链接已复制')).catch(()=>{prompt('复制此链接：',url)})
  }else{prompt('复制此链接：',url)}
}

function getStatus(it){
  if(ck[it.i])return 'done';
  if(it.d===TODAY)return 'today';
  if(it.d<TODAY)return 'overdue';
  return 'future';
}

function shouldShow(it){
  if(viewMode==='all')return true;
  const s=getStatus(it);
  if(s==='done'&&it.d<TODAY)return false;
  return true;
}

function updStats(){
  const tot=D.reduce((s,d)=>s+d.a,0);
  let paid=0,pc=0;
  D.forEach((d,i)=>{if(ck[i]){paid+=d.a;pc++}});
  const rem=tot-paid,now=new Date(),cm=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  let mr=0;
  D.forEach((d,i)=>{if(gm(d.d)===cm&&!ck[i])mr+=d.a});
  document.getElementById('hA').textContent=rem.toFixed(0);
  document.getElementById('sP').textContent='¥'+paid.toFixed(0);
  document.getElementById('sM').textContent='¥'+mr.toFixed(0);
  document.getElementById('sC').textContent=pc+'/'+D.length;
  const pct=paid/tot*100;
  document.getElementById('pB').style.width=pct+'%';
  document.getElementById('pP').textContent=pct.toFixed(1)+'%';
  document.getElementById('pL').textContent=pc+'/'+D.length;
  document.getElementById('ms').innerHTML=ML.map(m=>{
    const done=pc>=m.n;
    return`<div class="ml ${done?'dn':''}"><span class="mli">${m.i}</span><span class="mlt">${m.t}</span><span class="mld">${m.n}/${D.length}</span></div>`
  }).join('');

  let overdueCount=0,overdueAmt=0;
  D.forEach((d,i)=>{if(!ck[i]&&d.d<TODAY){overdueCount++;overdueAmt+=d.a}});
  const ab=document.getElementById('alertBox');
  if(overdueCount>0){
    ab.style.display='block';
    ab.innerHTML=`<div class="alert-card"><span class="alert-icon">⚠️</span><span class="alert-text">有 ${overdueCount} 期逾期未还</span><span class="alert-count">¥${overdueAmt.toFixed(0)}</span></div>`;
  }else{
    ab.style.display='none';
  }
}

function render(){
  updStats();
  const visibleItems=D.map((d,i)=>({...d,i})).filter(shouldShow);
  const weeks={},mmap={};
  visibleItems.forEach(it=>{
    const w=wk(it.d);
    if(!weeks[w])weeks[w]=[];
    weeks[w].push(it);
    const m=gm(it.d);
    if(!mmap[m])mmap[m]=[];
    if(!mmap[m].includes(w))mmap[m].push(w);
  });
  const app=document.getElementById('app'),months=Object.keys(mmap).sort();
  if(months.length===0){
    app.innerHTML=`<div class="empty"><div class="empty-i">🎉</div><div class="empty-t">没有待还的款项了</div></div>`;
    document.getElementById('nv').innerHTML='';
    return;
  }
  let h='';
  months.forEach(mk=>{
    const[y,m]=mk.split('-');
    const yr=y==='2027'?"'27 ":'';
    const ml=`${yr}${+m}月`;
    const mt=D.filter((d,i)=>gm(d.d)===mk&&!ck[i]).reduce((s,d)=>s+d.a,0);
    const mLabel=mt>0?`¥${mt.toFixed(0)}`:'已完成';
    h+=`<div class="sec" id="m-${mk}"><div class="sh"><span class="sm">${ml}</span><span class="st2">${mLabel}</span></div>`;
    mmap[mk].sort().forEach(w=>{
      const items=weeks[w];
      const we=new Date(w+'T00:00:00');
      we.setDate(we.getDate()+6);
      const wes=we.toISOString().slice(0,10);
      const wt=items.filter(it=>!ck[it.i]).reduce((s,d)=>s+d.a,0);
      h+=`<div class="wk"><div class="wkh"><span class="wkr">${fm(w)} — ${fm(wes)}</span><span class="wka">¥${wt.toFixed(0)}</span></div>`;
      items.forEach(it=>{
        const dt=new Date(it.d+'T00:00:00'),wd=WD[dt.getDay()];
        const status=getStatus(it),on=ck[it.i];
        let cls='it';
        if(on)cls+=' dn';
        if(status==='today')cls+=' today';
        else if(status==='overdue')cls+=' overdue';
        let tag='';
        if(status==='today')tag=`<span class="itg tt">今天</span>`;
        else if(status==='overdue')tag=`<span class="itg tov">逾期</span>`;
        else if(it.t)tag=`<span class="itg te">${it.t}</span>`;
        h+=`<div class="${cls}" data-idx="${it.i}"><div class="ck${on?' on':''}"></div><div class="ib"><div class="itp"><span class="idt">${fm(it.d)}</span><span class="idy">周${wd}</span>${tag}</div><div class="is"><span class="dt"></span>360借条</div></div><div class="ia">¥${it.a.toFixed(2)}</div></div>`;
      });
      h+=`</div>`;
    });
    h+=`</div>`;
  });
  app.innerHTML=h;
  document.getElementById('nv').innerHTML=months.map(mk=>{
    const[y,m]=mk.split('-');
    const yr=y==='2027'?"'27 ":'';
    return`<button class="ni" data-m="${mk}">${yr}${+m}月</button>`;
  }).join('');
}

document.body.addEventListener('click',function(e){
  const tglBtn=e.target.closest('.tgl-btn');
  if(tglBtn){
    document.querySelectorAll('.tgl-btn').forEach(b=>b.classList.remove('on'));
    tglBtn.classList.add('on');
    viewMode=tglBtn.dataset.mode;
    render();
    return;
  }
  const niBtn=e.target.closest('.ni');
  if(niBtn){
    const mk=niBtn.dataset.m;
    const el=document.getElementById('m-'+mk);
    if(el){
      window.scrollTo({top:el.getBoundingClientRect().top+window.scrollY-180,behavior:'smooth'});
    }
    return;
  }
  const itEl=e.target.closest('.it');
  if(itEl){
    const idx=parseInt(itEl.dataset.idx);
    if(!isNaN(idx))tog(idx);
    return;
  }
  if(e.target.id==='resetBtn'){resetAll();return}
  if(e.target.id==='shareBtn'){shareUrl();return}
  if(e.target.id==='tp'){window.scrollTo({top:0,behavior:'smooth'});return}
});

window.addEventListener('scroll',function(){
  document.getElementById('tp').classList.toggle('show',window.scrollY>400);
});

render();
</script>
</body>
</html>
