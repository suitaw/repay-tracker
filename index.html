<html lang="zh-CN">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PAYOFF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#fafaf9;
  --surface:#ffffff;
  --surface2:#f5f5f4;
  --border:#e7e5e4;
  --text:#1c1917;
  --text2:#78716c;
  --text3:#a8a29e;
  --accent:#18181b;
  --green:#16a34a;
  --green-bg:#f0fdf4;
  --green-border:#bbf7d0;
  --red:#dc2626;
  --red-bg:#fef2f2;
  --orange:#ea580c;
  --orange-bg:#fff7ed;
  --blue:#2563eb;
  --radius:16px;
}

body{
  font-family:'DM Sans',system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding-bottom:120px;
  font-size:15px;
  line-height:1.5;
}

/* ===== HEADER ===== */
.header{
  position:sticky;top:0;z-index:100;
  background:rgba(250,250,249,0.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:16px 20px 12px;
}

.brand{
  font-family:'DM Mono',monospace;
  font-size:13px;
  font-weight:500;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--text3);
  text-align:center;
  margin-bottom:16px;
}

.hero{
  text-align:center;
  margin-bottom:14px;
}

.hero-amount{
  font-family:'DM Mono',monospace;
  font-size:42px;
  font-weight:700;
  letter-spacing:-2px;
  color:var(--text);
  line-height:1;
}

.hero-label{
  font-size:12px;
  color:var(--text3);
  margin-top:4px;
  letter-spacing:1px;
  text-transform:uppercase;
}

.stats-row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:1px;
  background:var(--border);
  border-radius:12px;
  overflow:hidden;
  margin-bottom:12px;
}

.stat{
  background:var(--surface);
  padding:12px 8px;
  text-align:center;
}

.stat-val{
  font-family:'DM Mono',monospace;
  font-size:18px;
  font-weight:600;
  color:var(--text);
}

.stat-val.green{color:var(--green)}
.stat-val.orange{color:var(--orange)}

.stat-lbl{
  font-size:11px;
  color:var(--text3);
  margin-top:2px;
  letter-spacing:0.5px;
}

/* Progress */
.progress{
  height:4px;
  background:var(--surface2);
  border-radius:2px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  background:var(--accent);
  border-radius:2px;
  transition:width 0.6s cubic-bezier(0.4,0,0.2,1);
}

.progress-info{
  display:flex;
  justify-content:space-between;
  margin-top:6px;
  font-family:'DM Mono',monospace;
  font-size:11px;
  color:var(--text3);
}

/* ===== NAV ===== */
.nav{
  display:flex;
  gap:4px;
  padding:10px 20px;
  overflow-x:auto;
  scrollbar-width:none;
  position:sticky;
  top:178px;
  z-index:50;
  background:rgba(250,250,249,0.9);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.nav::-webkit-scrollbar{display:none}

.nav-item{
  flex-shrink:0;
  padding:6px 16px;
  border-radius:100px;
  border:none;
  background:transparent;
  color:var(--text3);
  font-family:'DM Sans',sans-serif;
  font-size:13px;
  font-weight:500;
  cursor:pointer;
  transition:all 0.2s;
}

.nav-item.active{
  background:var(--accent);
  color:#fff;
}

/* ===== MILESTONES ===== */
.milestones{
  padding:8px 20px 4px;
}

.ms{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 14px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  margin-bottom:6px;
  transition:all 0.3s;
}

.ms.done{
  background:var(--green-bg);
  border-color:var(--green-border);
}

.ms.done .ms-text{text-decoration:line-through;color:var(--text3)}

.ms-icon{font-size:18px;flex-shrink:0}
.ms-text{flex:1;font-size:13px;font-weight:500}
.ms-date{font-family:'DM Mono',monospace;font-size:12px;color:var(--text3)}

/* ===== SECTIONS ===== */
.section{padding:0 20px;margin-bottom:8px}

.section-head{
  display:flex;
  align-items:baseline;
  gap:8px;
  padding:20px 0 10px;
  position:sticky;
  top:218px;
  background:var(--bg);
  z-index:10;
}

.section-month{
  font-size:22px;
  font-weight:700;
  letter-spacing:-0.5px;
}

.section-total{
  font-family:'DM Mono',monospace;
  font-size:13px;
  color:var(--text3);
}

/* Week Card */
.week{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  margin-bottom:10px;
  overflow:hidden;
}

.week-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
  border-bottom:1px solid var(--border);
}

.week-range{
  font-size:13px;
  color:var(--text2);
  font-weight:500;
}

.week-amt{
  font-family:'DM Mono',monospace;
  font-size:14px;
  font-weight:600;
}

.week-amt.high{color:var(--red)}
.week-amt.mid{color:var(--orange)}
.week-amt.low{color:var(--green)}

/* Pay Item */
.item{
  display:flex;
  align-items:center;
  padding:14px 16px;
  gap:12px;
  border-bottom:1px solid var(--surface2);
  transition:all 0.25s;
  cursor:pointer;
  -webkit-user-select:none;
  user-select:none;
}

.item:last-child{border-bottom:none}

.item.done{opacity:0.35}
.item.done .item-amt{text-decoration:line-through}

.check{
  width:24px;height:24px;
  border-radius:50%;
  border:2px solid var(--border);
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
}

.check.on{
  border-color:var(--green);
  background:var(--green);
}

.check.on::after{
  content:'';
  width:6px;height:10px;
  border:solid #fff;border-width:0 2px 2px 0;
  transform:rotate(45deg);
  margin-top:-2px;
}

.item-body{flex:1;min-width:0}

.item-top{
  display:flex;
  align-items:center;
  gap:6px;
}

.item-date{
  font-size:14px;
  font-weight:600;
}

.item-day{
  font-size:12px;
  color:var(--text3);
}

.item-tag{
  font-size:10px;
  padding:1px 6px;
  border-radius:4px;
  font-weight:600;
  letter-spacing:0.3px;
}

.tag-end{background:var(--green-bg);color:var(--green)}
.tag-fire{background:var(--red-bg);color:var(--red)}

.item-src{
  font-size:12px;
  color:var(--text3);
  margin-top:1px;
}

.item-amt{
  font-family:'DM Mono',monospace;
  font-size:16px;
  font-weight:600;
  flex-shrink:0;
}

.src-360{color:var(--text)}
.src-apple{color:#e11d48}
.src-jd{color:var(--orange)}
.src-oneplus{color:var(--red)}
.src-meituan{color:var(--blue)}

/* Dot indicator for source */
.src-dot{
  display:inline-block;
  width:6px;height:6px;
  border-radius:50%;
  margin-right:4px;
  vertical-align:middle;
}

.dot-360{background:var(--accent)}
.dot-apple{background:#e11d48}
.dot-jd{background:var(--orange)}
.dot-oneplus{background:var(--red)}
.dot-meituan{background:var(--blue)}

/* Reset */
.reset{
  display:block;
  margin:40px auto 20px;
  padding:14px 32px;
  background:var(--surface);
  color:var(--red);
  border:1px solid var(--border);
  border-radius:100px;
  font-size:14px;
  font-weight:500;
  font-family:'DM Sans',sans-serif;
  cursor:pointer;
}

/* Top button */
.totop{
  position:fixed;
  bottom:28px;right:20px;
  width:48px;height:48px;
  border-radius:50%;
  background:var(--accent);
  color:#fff;
  font-size:18px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  z-index:200;
  box-shadow:0 4px 20px rgba(0,0,0,0.15);
  opacity:0;pointer-events:none;
  transition:all 0.3s;
  border:none;
}

.totop.show{opacity:1;pointer-events:auto}
</style>
</head>
<body>

<div class="header" id="header">
  <div class="brand">PAYOFF</div>
  <div class="hero">
    <div class="hero-amount" id="heroAmt">¥0</div>
    <div class="hero-label">剩余待还</div>
  </div>
  <div class="stats-row">
    <div class="stat">
      <div class="stat-val green" id="sPaid">¥0</div>
      <div class="stat-lbl">已还</div>
    </div>
    <div class="stat">

    <div class="stat">
      <div class="stat-val" id="sCount">0/96</div>

    </div>
  </div>
  <div class="progress"><div class="progress-bar" id="pBar"></div></div>
  <div class="progress-info">
    <span id="pPct">0%</span>
    <span id="pLabel">0/96</span>
  </div>
</div>

<div class="nav" id="nav"></div>
<div class="milestones" id="ms"></div>
<div id="app"></div>
<button class="reset" onclick="resetAll()">重置所有记录</button>
<button class="totop" id="totop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

const WD=['日','一','二','三','四','五','六'];
const DOT={'360借条':'dot-360','苹果分期':'dot-apple','京东白条':'dot-jd','一加分期':'dot-oneplus','美团':'dot-meituan'};
const SRC={'360借条':'src-360','苹果分期':'src-apple','京东白条':'src-jd','一加分期':'src-oneplus','美团':'src-meituan'};
const MS=[
  {d:"2026-05-03",i:"🍎",t:"苹果分期结清"},
  {d:"2026-05-15",i:"📱",t:"一加分期结清"},
  {d:"2026-07-17",i:"🍜",t:"美团结清"},
  {d:"2027-02-28",i:"💳",t:"京东白条结清"},
  {d:"2027-04-05",i:"🎉",t:"全部归零"}
];

let ck={};
try{ck=JSON.parse(localStorage.getItem('po_ck')||'{}')}catch(e){}
function sv(){localStorage.setItem('po_ck',JSON.stringify(ck))}

function wkStart(ds){
  const d=new Date(ds),w=d.getDay(),diff=(w<4)?-(w+3):-(w-4);
  const s=new Date(d);s.setDate(s.getDate()+diff);
  return s.toISOString().slice(0,10);
}
function fmd(ds){const[y,m,d]=ds.split('-');return`${+m}/${+d}`}
function gm(ds){return ds.slice(0,7)}

function tog(i){ck[i]=!ck[i];sv();upd()}
function resetAll(){if(confirm('确定清除所有记录？')){ck={};sv();upd()}}

function upd(){
  const tot=D.reduce((s,d)=>s+d.a,0);
  let paid=0,pc=0;
  D.forEach((d,i)=>{if(ck[i]){paid+=d.a;pc++}});
  const rem=tot-paid;
  const now=new Date(),cm=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  let mr=0;
  D.forEach((d,i)=>{if(gm(d.d)===cm&&!ck[i])mr+=d.a});

  document.getElementById('heroAmt').textContent='¥'+rem.toFixed(0);
  document.getElementById('sPaid').textContent='¥'+paid.toFixed(0);
  document.getElementById('sMonth').textContent='¥'+mr.toFixed(0);
  document.getElementById('sCount').textContent=pc+'/'+D.length;

  const pct=paid/tot*100;
  document.getElementById('pBar').style.width=pct+'%';
  document.getElementById('pPct').textContent=pct.toFixed(1)+'%';
  document.getElementById('pLabel').textContent=pc+'/'+D.length;

  // Milestones
  document.getElementById('ms').innerHTML=MS.map(m=>{
    const ri=D.filter(d=>{
      if(m.t.includes('苹果'))return d.s==='苹果分期';
      if(m.t.includes('一加'))return d.s==='一加分期';
      if(m.t.includes('美团'))return d.s==='美团';
      if(m.t.includes('白条'))return d.s==='京东白条';
      return true;
    });
    const done=ri.every((_,__)=>ck[D.indexOf(ri[__])]);
    return`<div class="ms ${done?'done':''}"><span class="ms-icon">${m.i}</span><span class="ms-text">${m.t}</span><span class="ms-date">${fmd(m.d)}</span></div>`;
  }).join('');

  // Items
  D.forEach((d,i)=>{
    const el=document.getElementById('ck-'+i);
    const row=document.getElementById('r-'+i);
    if(el&&row){el.className='check'+(ck[i]?' on':'');row.className='item'+(ck[i]?' done':'')}
  });

  // Week totals
  document.querySelectorAll('.week-amt').forEach(el=>{
    const wk=el.dataset.w;
    let wr=0;
    D.forEach((d,i)=>{if(wkStart(d.d)===wk&&!ck[i])wr+=d.a});
    el.textContent='¥'+wr.toFixed(0);
    el.className='week-amt'+(wr>800?' high':wr>400?' mid':' low');
  });
}

function render(){
  const weeks={},mmap={};
  D.forEach((d,i)=>{
    const wk=wkStart(d.d);
    if(!weeks[wk])weeks[wk]=[];
    weeks[wk].push({...d,i});
    const m=gm(d.d);
    if(!mmap[m])mmap[m]=[];
    if(!mmap[m].includes(wk))mmap[m].push(wk);
  });

  const app=document.getElementById('app');
  const months=Object.keys(mmap).sort();
  let h='';

  months.forEach(mk=>{
    const[y,m]=mk.split('-');
    const yr=y==='2027'?"'27 ":'';
    const ml=`${yr}${+m}月`;
    const mt=D.filter(d=>gm(d.d)===mk).reduce((s,d)=>s+d.a,0);

    h+=`<div class="section" id="m-${mk}">`;
    h+=`<div class="section-head"><span class="section-month">${ml}</span><span class="section-total">¥${mt.toFixed(0)}</span></div>`;

    mmap[mk].sort().forEach(wk=>{
      const items=weeks[wk];
      const we=new Date(wk);we.setDate(we.getDate()+6);
      const wes=we.toISOString().slice(0,10);
      const wt=items.reduce((s,d)=>s+d.a,0);

      h+=`<div class="week"><div class="week-head"><span class="week-range">${fmd(wk)} — ${fmd(wes)}</span><span class="week-amt${wt>800?' high':wt>400?' mid':' low'}" data-w="${wk}">¥${wt.toFixed(0)}</span></div>`;

      items.forEach(it=>{
        const dt=new Date(it.d),wd=WD[dt.getDay()];
        const on=ck[it.i];
        let tag='';
        if(it.t){
          const tc=it.t.includes('最后')||it.t.includes('结清')?'tag-end':'tag-fire';
          tag=`<span class="item-tag ${tc}">${it.t}</span>`;
        }
        h+=`<div class="item${on?' done':''}" id="r-${it.i}" onclick="tog(${it.i})">
<div class="check${on?' on':''}" id="ck-${it.i}"></div>
<div class="item-body"><div class="item-top"><span class="item-date">${fmd(it.d)}</span><span class="item-day">周${wd}</span>${tag}</div><div class="item-src"><span class="src-dot ${DOT[it.s]||''}"></span>${it.s}</div></div>
<div class="item-amt ${SRC[it.s]||''}">¥${it.a.toFixed(2)}</div></div>`;
      });
      h+=`</div>`;
    });
    h+=`</div>`;
  });

  app.innerHTML=h;

  // Nav
  document.getElementById('nav').innerHTML=months.map(mk=>{
    const[y,m]=mk.split('-');
    const yr=y==='2027'?"'27 ":'';
    return`<button class="nav-item" data-m="${mk}" onclick="scrollM('${mk}')">${yr}${+m}月</button>`;
  }).join('');

  upd();updNav();
}

function scrollM(mk){
  const el=document.getElementById('m-'+mk);
  if(el){
    const off=document.getElementById('header').offsetHeight+document.getElementById('nav').offsetHeight+10;
    window.scrollTo({top:el.getBoundingClientRect().top+window.scrollY-off,behavior:'smooth'});
  }
}

function updNav(){
  const btns=document.querySelectorAll('.nav-item');
  const off=document.getElementById('header').offsetHeight+document.getElementById('nav').offsetHeight+60;
  let active=null;
  document.querySelectorAll('.section[id^="m-"]').forEach(s=>{
    if(s.getBoundingClientRect().top<off+100)active=s.id.replace('m-','');
  });
  btns.forEach(b=>{b.classList.toggle('active',b.dataset.m===active)});
  const ab=document.querySelector('.nav-item.active');
  if(ab){const n=document.getElementById('nav');n.scrollTo({left:ab.offsetLeft-n.offsetWidth/2+ab.offsetWidth/2,behavior:'smooth'})}
}

let st;
window.addEventListener('scroll',()=>{
  clearTimeout(st);st=setTimeout(updNav,50);
  document.getElementById('totop').classList.toggle('show',window.scrollY>400);
});

render();
</script>
</body>
</html>
